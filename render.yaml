services:
  - type: web
    name: groupbot-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false          # Set manually in Render dashboard (secret)
      - key: OWNER_USERNAME
        sync: false          # Set manually in Render dashboard
      - key: SUPPORT_CHANNEL
        sync: false          # Optional: your support channel username (no @)
      - key: BOT_AUTOSTART
        value: "true"        # Auto-start bot on deploy
